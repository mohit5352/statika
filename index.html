    <!-- ── MathJax 3 ──────────────────────────────────────────────── -->
    <script>
      window.MathJax = {
        loader: { load: ['[tex]/boldsymbol'] },
        tex: {
          packages: { '[+]': ['boldsymbol'] },
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true,
          processEnvironments: true,
          macros: {
            mean: "{\\text{mean}}"
          }
        },
        options: {
          ignoreHtmlClass: 'tex2jax_ignore',
          processHtmlClass: 'tex2jax_process'
        }
      };
    </script>
